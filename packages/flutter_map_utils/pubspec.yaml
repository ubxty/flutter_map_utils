name: flutter_map_utils
description: "Drawing, editing & measurement widgets for flutter_map. Built on map_utils_core algorithms. Interactive polygon/polyline/circle drawing, vertex editing, snapping, undo/redo, GeoJSON import/export."
version: 0.2.0
homepage: https://ubxty.com
repository: https://github.com/ubxty/map_utils
issue_tracker: https://github.com/ubxty/map_utils/issues

topics:
  - flutter-map
  - map
  - gis
  - drawing
  - geometry

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^8.0.0
  latlong2: ^0.9.1
  map_utils_core:
    path: ../map_utils_core
  meta: ^1.11.0

dev_dependencies:
  flutter_lints: ">=5.0.0 <7.0.0"
  flutter_test:
    sdk: flutter
