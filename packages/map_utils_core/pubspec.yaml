name: map_utils_core
description: "Platform-agnostic geometry algorithms, shape models, drawing state, snapping, undo/redo, and GeoJSON utilities. No map-SDK dependency — works with any map engine."
version: 0.2.0
homepage: https://ubxty.com
repository: https://github.com/ubxty/map_utils
issue_tracker: https://github.com/ubxty/map_utils/issues

topics:
  - map
  - gis
  - geometry
  - geojson
  - drawing

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

resolution: workspace

dependencies:
  collection: ^1.18.0
  flutter:
    sdk: flutter
  latlong2: ^0.9.1
  meta: ^1.11.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_lints: ">=5.0.0 <7.0.0"
  flutter_test:
    sdk: flutter
